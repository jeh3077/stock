<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockBoard Pro | 2026 실시간 주식 현황판</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .chart-container .apexcharts-canvas { margin: 0 auto; }
        .live-pulse {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Real-world Latest Data (as of April 24, 2026) ---
        const generateInitialData = () => {
            const rawData = [
                { id: 1, name: "삼성전자", code: "005930", price: 220500, basePrice: 224500, cap: "1,320.6조", per: 22.5, pbr: 2.1, roe: 15.8 },
                { id: 2, name: "SK하이닉스", code: "000660", price: 1228000, basePrice: 1225000, cap: "895.3조", per: 18.2, pbr: 3.2, roe: 24.5 },
                { id: 3, name: "LG 에너지솔루션", code: "373220", price: 467000, basePrice: 466500, cap: "109.2조", per: 52.0, pbr: 4.8, roe: 9.2 },
                { id: 4, name: "현대차", code: "005380", price: 515000, basePrice: 532000, cap: "108.4조", per: 8.2, pbr: 0.9, roe: 16.1 },
                { id: 5, name: "삼성바이오로직스", code: "207940", price: 1530000, basePrice: 1514000, cap: "108.8조", per: 75.4, pbr: 6.2, roe: 12.1 },
                { id: 6, name: "기아", code: "000270", price: 125600, basePrice: 128800, cap: "51.1조", per: 6.2, pbr: 1.1, roe: 21.5 },
                { id: 7, name: "한화에어로스페이스", code: "012450", price: 1467000, basePrice: 1425000, cap: "74.1조", per: 32.4, pbr: 4.5, roe: 18.2 },
                { id: 8, name: "셀트리온", code: "068270", price: 309500, basePrice: 305000, cap: "68.5조", per: 42.1, pbr: 7.2, roe: 11.5 },
                { id: 9, name: "SK스퀘어", code: "402340", price: 732000, basePrice: 728000, cap: "85.4조", per: 12.4, pbr: 1.5, roe: 15.2 },
                { id: 10, name: "NAVER", code: "035420", price: 213500, basePrice: 209600, cap: "35.1조", per: 28.5, pbr: 1.8, roe: 14.5 },
                ...Array.from({length: 40}, (_, i) => {
                    const price = Math.floor(Math.random() * 200000) + 10000;
                    return {
                        id: i + 11,
                        name: `2026 유망주 ${i + 11}`,
                        code: `${Math.floor(Math.random() * 900000) + 100000}`,
                        price: price,
                        basePrice: price * (1 + (Math.random() * 0.02 - 0.01)),
                        cap: (Math.random() * 20 + 5).toFixed(1) + "조",
                        per: (Math.random() * 20 + 5).toFixed(1),
                        pbr: (Math.random() * 3 + 0.5).toFixed(1),
                        roe: (Math.random() * 15 + 5).toFixed(1)
                    }
                })
            ];
            return rawData.map(s => ({
                ...s,
                change: parseFloat(((s.price - s.basePrice) / s.basePrice * 100).toFixed(2))
            }));
        };

        // --- UI Components ---
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const StockChart = ({ symbol, timeframe, price, id }) => {
            useEffect(() => {
                let dataCount = 24;
                if (timeframe === '1W') dataCount = 7;
                else if (timeframe === '1M') dataCount = 30;

                const options = {
                    series: [{
                        name: '주가',
                        data: Array.from({length: dataCount}, () => Math.floor(price * (1 + (Math.random() * 0.02 - 0.01))))
                    }],
                    chart: {
                        type: 'area', height: 320, toolbar: { show: false },
                        background: 'transparent', fontFamily: 'Inter, sans-serif',
                        animations: { enabled: true, easing: 'easeinout', speed: 800 }
                    },
                    colors: ['#6366f1'],
                    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.0, stops: [0, 100] } },
                    dataLabels: { enabled: false },
                    stroke: { curve: 'smooth', width: 3 },
                    grid: { borderColor: '#1e293b', strokeDashArray: 4 },
                    xaxis: { labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
                    yaxis: { labels: { style: { colors: '#64748b' } } },
                    tooltip: { theme: 'dark' }
                };

                const chart = new ApexCharts(document.querySelector("#apex-chart"), options);
                chart.render();
                return () => chart.destroy();
            }, [symbol, timeframe, id]);

            return <div id="apex-chart" className="w-full"></div>;
        };

        // --- Main App ---
        const App = () => {
            const initialStocks = useMemo(() => generateInitialData(), []);
            const [stocks] = useState(initialStocks);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedId, setSelectedId] = useState(1);
            const [timeframe, setTimeframe] = useState('1D');
            const [watchlist, setWatchlist] = useState([]);

            const filteredStocks = useMemo(() => {
                return stocks.filter(s => 
                    s.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                    s.code.includes(searchQuery)
                );
            }, [stocks, searchQuery]);

            const selectedStock = useMemo(() => stocks.find(s => s.id === selectedId) || stocks[0], [stocks, selectedId]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 glass border-r border-slate-800 flex flex-col p-6 hidden lg:flex text-slate-200">
                        <div className="flex items-center gap-3 mb-10 px-2" onClick={() => window.location.reload()} style={{cursor:'pointer'}}>
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                                <Icon name="trending-up" className="text-white" />
                            </div>
                            <h1 className="text-xl font-black tracking-tighter uppercase">Market Pro</h1>
                        </div>
                        <nav className="space-y-1">
                            <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-indigo-600 text-white font-bold text-sm shadow-lg shadow-indigo-500/20">
                                <Icon name="layout-dashboard" /> 국내 주식
                            </button>
                            <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 font-bold text-sm transition-all">
                                <Icon name="globe" /> 해외 주식
                            </button>
                            <button className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 font-bold text-sm transition-all">
                                <Icon name="bar-chart-big" /> 재무 100선
                            </button>
                        </nav>
                        <div className="mt-10 flex-1 overflow-y-auto">
                            <h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 px-2">내 관심 종목</h3>
                            <div className="space-y-4">
                                {watchlist.length === 0 ? (
                                    <p className="text-[10px] text-slate-600 px-2 italic">종목을 추가해 보세요.</p>
                                ) : (
                                    watchlist.map(id => {
                                        const s = stocks.find(x => x.id === id);
                                        return (
                                            <div key={id} className="flex justify-between items-center px-2 cursor-pointer group" onClick={() => setSelectedId(id)}>
                                                <span className="text-sm font-bold group-hover:text-indigo-400 transition-colors">{s?.name}</span>
                                                <span className={`text-[11px] font-black ${s?.change >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                    {s?.change > 0 ? '+' : ''}{s?.change}%
                                                </span>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden bg-[#0a0f1e]">
                        {/* Header */}
                        <header className="h-20 glass border-b border-slate-800 flex items-center justify-between px-8 shrink-0 z-10">
                            <div className="relative w-full max-w-md">
                                <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input 
                                    type="text" 
                                    placeholder="종목명 또는 코드 검색"
                                    className="w-full bg-slate-900/50 border border-slate-800 rounded-2xl py-3 pl-12 pr-4 text-sm focus:outline-none focus:border-indigo-500 transition-all text-white"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-6">
                                <div className="flex gap-4 hidden xl:flex">
                                    <div className="glass px-4 py-2 rounded-xl text-xs font-bold text-white">KOSPI <span className="text-emerald-400 ml-2">6,463.91</span></div>
                                    <div className="glass px-4 py-2 rounded-xl text-xs font-bold text-white">USD/KRW <span className="text-rose-400 ml-2">1,483.00</span></div>
                                </div>
                                <div className="flex items-center gap-3 border-l border-slate-800 pl-6">
                                    <div className="live-pulse"></div>
                                    <span className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">LIVE 2026.04.24</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 space-y-8 pb-24 text-slate-200">
                            {/* Chart Section */}
                            <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                                <div className="xl:col-span-2 glass rounded-[2.5rem] p-8 shadow-2xl">
                                    <div className="flex justify-between items-start mb-8">
                                        <div className="flex items-center gap-5">
                                            <div className="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-xl font-black text-white">{selectedStock.name[0]}</div>
                                            <div>
                                                <div className="flex items-center gap-2 mb-1 text-white">
                                                    <h2 className="text-2xl font-black">{selectedStock.name}</h2>
                                                    <span className="text-xs font-bold text-slate-500 bg-slate-800 px-2 py-0.5 rounded-md">{selectedStock.code}</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-3xl font-black tracking-tighter text-white">{selectedStock.price.toLocaleString()}원</span>
                                                    <span className={`text-sm font-black ${selectedStock.change >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        {selectedStock.change >= 0 ? '▲' : '▼'} {Math.abs(selectedStock.change)}%
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex gap-1.5 p-1 glass rounded-xl">
                                            {['1D', '1W', '1M'].map(t => (
                                                <button key={t} onClick={() => setTimeframe(t)} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${timeframe === t ? 'bg-indigo-600 text-white' : 'text-slate-500 hover:text-slate-200'}`}>{t}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="chart-container">
                                        <StockChart symbol={selectedStock.code} timeframe={timeframe} price={selectedStock.price} id={selectedId} />
                                    </div>
                                </div>

                                <div className="glass rounded-[2.5rem] p-8 flex flex-col h-full">
                                    <h3 className="text-sm font-black mb-6 flex items-center gap-2 text-white">
                                        <Icon name="newspaper" className="text-indigo-400" /> 2026.04.24 마켓 브리핑
                                    </h3>
                                    <div className="space-y-6 flex-1 overflow-y-auto pr-2 text-sm leading-relaxed">
                                        <div className="group cursor-pointer">
                                            <p className="text-[9px] font-bold text-indigo-500 uppercase mb-1">BREAKING</p>
                                            <p className="font-bold group-hover:text-indigo-400 transition-colors">코스피 6,500선 돌파 후 중동 리스크에 소폭 하락 숨고르기</p>
                                        </div>
                                        <div className="group cursor-pointer">
                                            <p className="text-[9px] text-slate-500 mb-1">SEMICON</p>
                                            <p className="font-bold group-hover:text-indigo-400 transition-colors">SK하이닉스, 1분기 영업익 37.6조 기록... 120만 원 시대 안착</p>
                                        </div>
                                        <div className="group cursor-pointer">
                                            <p className="text-[9px] text-slate-500 mb-1">STRATEGY</p>
                                            <p className="font-bold group-hover:text-indigo-400 transition-colors">삼성전자, 외국인 매도세에 22만 원선 하회... 기관은 순매수</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Stock List Section */}
                            <div className="glass rounded-[2.5rem] p-8 overflow-hidden">
                                <div className="flex justify-between items-center mb-8 text-white">
                                    <h2 className="text-xl font-black">2026 실시간 종목 마켓 보드</h2>
                                    <div className="text-xs text-slate-400 font-bold uppercase tracking-widest">Live Terminal | KOSPI Top 50</div>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-slate-800">
                                            <tr>
                                                <th className="pb-4">순위</th>
                                                <th className="pb-4">종목</th>
                                                <th className="pb-4">현재가</th>
                                                <th className="pb-4">등락률</th>
                                                <th className="pb-4">시가총액</th>
                                                <th className="pb-4 text-center">관심</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/50 text-slate-200">
                                            {filteredStocks.map((s, i) => (
                                                <tr key={s.id} className={`group cursor-pointer hover:bg-slate-800/30 transition-all ${selectedId === s.id ? 'bg-indigo-500/10' : ''}`} onClick={() => {
                                                    setSelectedId(s.id);
                                                    window.scrollTo({ top: 0, behavior: 'smooth' });
                                                }}>
                                                    <td className="py-5 text-sm font-bold text-slate-500">{i + 1}</td>
                                                    <td className="py-5">
                                                        <div className="font-black text-sm group-hover:text-indigo-400 transition-colors">{s.name}</div>
                                                        <div className="text-[10px] text-slate-600">{s.code}</div>
                                                    </td>
                                                    <td className="py-5 text-sm font-black">{s.price.toLocaleString()}원</td>
                                                    <td className={`py-5 text-sm font-black ${s.change >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                        {s.change >= 0 ? '+' : ''}{s.change}%
                                                    </td>
                                                    <td className="py-5 text-sm font-bold text-slate-400">{s.cap}</td>
                                                    <td className="py-5 text-center">
                                                        <button onClick={(e) => {
                                                            e.stopPropagation();
                                                            setWatchlist(prev => prev.includes(s.id) ? prev.filter(x => x !== s.id) : [...prev, s.id]);
                                                        }} className={`p-2 rounded-lg transition-all ${watchlist.includes(s.id) ? 'text-amber-400' : 'text-slate-700 hover:text-slate-400'}`}>
                                                            <Icon name="star" size={16} className={watchlist.includes(s.id) ? 'fill-amber-400' : ''} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
